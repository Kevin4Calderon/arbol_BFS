<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BFS Ciudades</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      outline: none;
      width: 180px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00c6ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0072ff;
      color: white;
    }

    #resultado {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }

    .card {
      background: white;
      color: black;
      border-radius: 15px;
      padding: 15px;
      width: 140px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .step {
      font-weight: bold;
      margin-bottom: 10px;
      color: #0072ff;
    }
  </style>
</head>

<body>

  <h1>🌎 Ruta entre ciudades (BFS)</h1>

  <input id="inicial" value="Hidalgo" placeholder="Ciudad inicial">
  <input id="objetivo" value="GDL" placeholder="Ciudad destino">

  <br><br>
  <button onclick="resolver()">Buscar ruta</button>

  <h2>Ruta encontrada</h2>
  <div id="resultado"></div>

  <script>
    async function resolver() {
      const inicial = document.getElementById("inicial").value;
      const objetivo = document.getElementById("objetivo").value;

      const url = `/resolver?inicio=${inicial}&objetivo=${objetivo}`;

      try {
        const res = await fetch(url);
        const ruta = await res.json();

        const contenedor = document.getElementById("resultado");
        contenedor.innerHTML = "";

        if (!ruta || ruta.length === 0) {
          contenedor.innerHTML = "<p>No se encontró ruta</p>";
          return;
        }

        ruta.forEach((ciudad, i) => {
          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <div class="step">Paso ${i}</div>
            <div>${ciudad}</div>
          `;

          contenedor.appendChild(div);
        });

      } catch (error) {
        console.error(error);
        alert("Error al conectar con el servidor");
      }
    }
  </script>

</body>
</html>
